name: Apply Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

jobs:
  migrate:
    name: Run database migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Versão fixada para evitar quebras quando "latest" muda de comportamento.
          version: 2.108.0

      - name: Link project
        run: supabase link --project-ref pqvsdzvmbwbotkfggcxc
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # O histórico de migrations no banco já está completo e sincronizado com
      # os arquivos locais, então db push aplica apenas o que for realmente novo
      # (ou é no-op). A antiga etapa de "migration repair" com lista fixa foi
      # removida por ser obsoleta e conflitar com a CLI atual.
      - name: Apply pending migrations
        run: supabase db push --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
