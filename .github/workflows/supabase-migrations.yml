name: Apply Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

jobs:
  migrate:
    name: Run database migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref pqvsdzvmbwbotkfggcxc
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Mark all previously-applied local migrations as applied so db push
      # doesn't try to re-run them (schema objects already exist in the DB).
      # Only 20260428000002_add_appointment_date.sql is intentionally omitted
      # so it gets applied by the db push step below.
      - name: Sync migration history
        run: |
          supabase migration repair --status applied \
            20260126013012 20260126013149 20260126022722 20260126024352 \
            20260126024508 20260126025014 20260126025742 20260127003111 \
            20260205001838 20260207173319 20260313012906 20260322223618 \
            20260328000001 20260328000002 20260328000003 20260328000004 \
            20260328000005 20260328000006 \
            20260408000001 20260428000001 \
            --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply pending migrations
        run: supabase db push --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
