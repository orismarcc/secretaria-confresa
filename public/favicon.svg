<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#15803d"/>

  <!-- Wheat stalk center line -->
  <line x1="32" y1="56" x2="32" y2="10" stroke="#fef9c3" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Top grain (tip) -->
  <ellipse cx="32" cy="11" rx="4.5" ry="7" fill="#fef08a" stroke="#ca8a04" stroke-width="1"/>

  <!-- Grain pair 1 -->
  <ellipse cx="26" cy="20" rx="4" ry="6.5" transform="rotate(-25 26 20)" fill="#fef08a" stroke="#ca8a04" stroke-width="1"/>
  <ellipse cx="38" cy="20" rx="4" ry="6.5" transform="rotate(25 38 20)" fill="#fef08a" stroke="#ca8a04" stroke-width="1"/>

  <!-- Grain pair 2 -->
  <ellipse cx="23" cy="30" rx="4" ry="6.5" transform="rotate(-30 23 30)" fill="#fef08a" stroke="#ca8a04" stroke-width="1"/>
  <ellipse cx="41" cy="30" rx="4" ry="6.5" transform="rotate(30 41 30)" fill="#fef08a" stroke="#ca8a04" stroke-width="1"/>

  <!-- Grain pair 3 -->
  <ellipse cx="23" cy="41" rx="4" ry="6.5" transform="rotate(-35 23 41)" fill="#fef08a" stroke="#ca8a04" stroke-width="1"/>
  <ellipse cx="41" cy="41" rx="4" ry="6.5" transform="rotate(35 41 41)" fill="#fef08a" stroke="#ca8a04" stroke-width="1"/>

  <!-- Leaf left -->
  <path d="M32 50 Q20 46 18 38 Q26 40 32 50Z" fill="#4ade80" opacity="0.9"/>
  <!-- Leaf right -->
  <path d="M32 50 Q44 46 46 38 Q38 40 32 50Z" fill="#4ade80" opacity="0.9"/>
</svg>
